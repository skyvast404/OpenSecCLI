rules:
  - id: opensec-xss-innerhtml
    pattern: $EL.innerHTML = $INPUT
    message: "DOM XSS via innerHTML. Use textContent or a sanitization library."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe:
        - "CWE-79: Cross-site Scripting"

  - id: opensec-xss-dangerously
    pattern: dangerouslySetInnerHTML={{__html: $INPUT}}
    message: "React XSS via dangerouslySetInnerHTML. Sanitize with DOMPurify."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe:
        - "CWE-79: Cross-site Scripting"

  - id: opensec-xss-res-send
    patterns:
      - pattern: res.send($INPUT)
      - pattern-not: res.send("...")
    message: "Potential XSS: dynamic content in res.send(). Use template engine."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe:
        - "CWE-79: Cross-site Scripting"
